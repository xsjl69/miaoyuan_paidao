<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S77狮子座202607喵园首日排刀表</title>
    <script src="data.js"></script>
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #fff; color: #333; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; color: #c0392b; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 8px 10px; text-align: center; border: 1px solid #ccc; font-size: 13px; }
        th { background: #f0f0f0; color: #333; font-weight: bold; white-space: nowrap; }
        td { color: #333; }
        tr:nth-child(even) { background: #fafafa; }
        td[rowspan] { vertical-align: middle; }

        .axis-icon { cursor: pointer; font-size: 20px; user-select: none; display: inline-block; padding: 2px 6px; border-radius: 4px; transition: background 0.2s; }
        .axis-icon:hover { background: #e0e0e0; }
        .axis-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .axis-modal.active { display: flex; align-items: center; justify-content: center; }
        .axis-modal img { max-width: 95vw; max-height: 95vh; border-radius: 6px; box-shadow: 0 4px 30px rgba(0,0,0,0.5); }
        .axis-modal-close { position: absolute; top: 16px; right: 28px; color: #fff; font-size: 36px; cursor: pointer; user-select: none; }
        .axis-modal-close:hover { color: #ccc; }
        .highlight-row { background: #fff9c4 !important; transition: background 0.5s; }
        .highlight-row td { background: #fff9c4 !important; }
        .highlight-row { background: #fff9c4 !important; transition: background 0.5s; }
        .highlight-row td { background: #fff9c4 !important; }

        /* ===== 浮动导航 ===== */
        .float-nav { position: fixed; right: 12px; bottom: 60px; z-index: 9998; }
        .float-nav-toggle { width: 44px; height: 44px; border-radius: 50%; background: #1565C0; color: #fff; font-size: 20px; border: none; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; transition: transform 0.2s, background 0.2s; }
        .float-nav-toggle:hover { background: #0D47A1; transform: scale(1.08); }
        .float-nav-toggle:active { transform: scale(0.95); }
        .float-nav-panel { display: none; position: absolute; right: 0; bottom: 52px; background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.18); padding: 8px 0; min-width: 140px; }
        .float-nav-panel.open { display: block; }
        .float-nav-panel a { display: block; padding: 10px 16px; font-size: 13px; color: #333; text-decoration: none; white-space: nowrap; transition: background 0.15s; }
        .float-nav-panel a:hover { background: #f0f4ff; color: #1565C0; }
        .float-nav-panel a .nav-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
        .float-nav-backdrop { display: none; position: fixed; inset: 0; z-index: 9997; }
        .float-nav-backdrop.open { display: block; }

        /* 移动端导航调整 */
        @media screen and (max-width: 768px) {
            .float-nav { right: 8px; bottom: 40px; }
            .float-nav-toggle { width: 42px; height: 42px; font-size: 18px; }
            .float-nav-panel { bottom: 50px; min-width: 130px; }
            .float-nav-panel a { padding: 11px 14px; font-size: 14px; }
        }

        /* ===== 提示图标 ===== */
        .tips-float { position: fixed; left: 12px; top: 12px; z-index: 9998; }
        .tips-float-btn { width: 44px; height: 44px; border-radius: 50%; background: #e65100; color: #fff; font-size: 22px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; transition: transform 0.2s, background 0.2s; }
        .tips-float-btn:hover { background: #bf360c; transform: scale(1.08); }
        .tips-float-btn:active { transform: scale(0.95); }
        .tips-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.55); }
        .tips-overlay.active { display: flex; align-items: center; justify-content: center; }
        .tips-dialog { position: relative; background: rgba(255,255,255,0.92); border-radius: 12px; padding: 28px 24px 24px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center; }
        .tips-dialog p { font-size: 15px; color: #333; line-height: 1.7; margin: 0; white-space: pre-line; text-align: left; }
        .tips-dialog-close { position: absolute; top: 8px; right: 14px; font-size: 22px; color: #999; cursor: pointer; user-select: none; background: none; border: none; padding: 4px 8px; }
        .tips-dialog-close:hover { color: #333; }

        /* ===== 移动端适配 ===== */
        @media screen and (max-width: 768px) {
            body { padding: 6px; }
            h1 { font-size: 17px; margin-bottom: 10px; }
            h2 { font-size: 14px; }
            .container { max-width: 100%; }

            table {
                font-size: 12px;
                display: block;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            th, td {
                padding: 6px 6px;
                white-space: normal;
                word-break: break-word;
                line-height: 1.55;
                vertical-align: top;
            }

            th {
                white-space: nowrap;
                font-size: 11px;
                padding: 5px 6px;
                background: #eee;
                position: sticky;
                top: 0;
                z-index: 1;
            }

            td[rowspan] { vertical-align: middle; }

            details[open] { margin-bottom: 6px !important; }
            summary {
                font-size: 13px !important;
                padding: 7px 10px !important;
                line-height: 1.6;
            }
            .axis-icon { font-size: 24px; padding: 6px 8px; }
            .axis-modal-close { top: 6px; right: 14px; font-size: 28px; }
            .axis-modal img { max-width: 98vw; max-height: 90vh; }

            /* 汇总统计表单独处理 */
            details > table { font-size: 11px; }
            details > table th, details > table td { padding: 5px 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>S77狮子座202607喵园首日排刀表 - v1</h1>

        <div id="summary" style="background:#f8f9fa; border:1px solid #ddd; border-radius:8px; padding:16px; margin-bottom:20px;">
            <h2 style="text-align:center; margin-bottom:14px; color:#333; font-size:18px;">全表阵容统计汇总</h2>
            <div id="summaryContent"></div>
            <div id="summaryTotal" style="text-align:center; font-size:15px; font-weight:bold; padding:8px; background:#f5f5f5; border-radius:6px; color:#333;"></div>
        </div>

        <div id="userJump" style="text-align:center; padding:6px 0 4px 0;">
            <label for="userSelect" style="font-size:14px; font-weight:bold; color:#333; margin-right:8px;">快速跳转用户：</label>
            <select id="userSelect" style="font-size:14px; padding:6px 12px; border:1px solid #bbb; border-radius:6px; background:#fff; cursor:pointer; max-width:220px;" onchange="jumpToUser(this.value)">
                <option value="">-- 选择用户 --</option>
            </select>
        </div>

        <div id="ranking">
            <table>
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>用户ID</th>
                        <th>骑士等级</th>
                        <th>第一刀</th>
                        <th>第二刀</th>
                        <th>第三刀</th>
                    </tr>
                </thead>
                <tbody id="rankingBody"></tbody>
            </table>
        </div>
    </div>

    <div class="axis-modal" id="axisModal" onclick="closeAxisModal()">
        <span class="axis-modal-close">&times;</span>
        <img id="axisModalImg" src="" alt="轴图" onclick="event.stopPropagation()">
    </div>

    <div class="float-nav">
        <button class="float-nav-toggle" id="navToggle" title="快速导航">&#9776;</button>
        <div class="float-nav-panel" id="navPanel"></div>
    </div>
    <div class="float-nav-backdrop" id="navBackdrop"></div>

    <div class="tips-float">
        <button class="tips-float-btn" id="tipsBtn" title="提示">!</button>
    </div>
    <div class="tips-overlay" id="tipsOverlay">
        <div class="tips-dialog" onclick="event.stopPropagation()">
            <button class="tips-dialog-close" id="tipsClose">&times;</button>
            <p id="tipsText"></p>
        </div>
    </div>

    <script>
        // ==================== 数据加载与渲染 ====================
        var gData = null;

        renderAll(KNIFE_DATA);

        function renderAll(data) {
            renderSummary(data);
            renderRanking(data);
            renderUserSelect(data);
            renderFloatNav(data);
        }

        // ==================== 汇总表渲染 ====================
        function renderSummary(data) {
            var knifeTypes = data.knife_types;
            var users = data.users;

            // 统计每个刀型ID的出现次数（每个pair的两个元素都计）
            var knifeCount = {};
            users.forEach(function(u) {
                u.knives.forEach(function(k) {
                    if (Array.isArray(k)) {
                        k.forEach(function(kid) {
                            if (kid) knifeCount[kid] = (knifeCount[kid] || 0) + 1;
                        });
                    } else if (k) {
                        knifeCount[k] = (knifeCount[k] || 0) + 1;
                    }
                });
            });

            // 按 zone 分组
            var zones = ["B", "C", "D"];
            var zoneNames = {"B": "B区", "C": "C区", "D": "D区"};
            var zoneBgs = {"B": ["#e3f2fd", "#1565C0"], "C": ["#e8f5e9", "#2E7D32"], "D": ["#fdecea", "#b71c1c"]};
            var totals = {B: 0, C: 0, D: 0};

            var container = document.getElementById("summaryContent");
            var html = "";

            zones.forEach(function(zone) {
                var zoneKnives = knifeTypes.filter(function(k) { return k.zone === zone; });
                // 按编号分组
                var numMap = {};
                zoneKnives.forEach(function(k) {
                    var num = k.id.split("-")[0];
                    if (!numMap[num]) numMap[num] = [];
                    numMap[num].push(k);
                });

                // 构建表格行
                var rows = "";
                var rowIdx = 0;
                var zoneCount = 0;
                var bg = zoneBgs[zone][0];
                var color = zoneBgs[zone][1];

                Object.keys(numMap).sort().forEach(function(num) {
                    numMap[num].forEach(function(k) {
                        var count = knifeCount[k.id] || 0;
                        // 即使刀数为0也显示
                        zoneCount += count;
                        var desc = k.description;
                        desc = desc.replace(/紫罗兰/g, '<span style="color:red">紫罗兰</span>').replace(/白望/g, '<span style="color:red">白望</span>');

                        var videoLink = "略";
                        var videoSource = "略";
                        var axisHtml = "略";

                        if (k.video_url) {
                            videoLink = '<a href="' + k.video_url + '" target="_blank" style="font-size:11px; color:#2196F3; text-decoration:none;">▶</a>';
                        }
                        videoSource = k.video_source;
                        if (k.axis_image) {
                            axisHtml = '<span class="axis-icon" onclick="openAxisModal(this)" data-img="' + k.axis_image + '">📷</span>';
                        }

                        var rowBg = rowIdx % 2 === 0 ? ' background:#fafafa;' : '';
                        rowIdx++;
                        rows += '<tr style="' + rowBg + '">'
                            + '<td style="padding:4px 8px; border:1px solid #ddd; text-align:center;">' + k.id + '</td>'
                            + '<td style="padding:4px 8px; border:1px solid #ddd; text-align:center;">' + count + '</td>'
                            + '<td style="padding:4px 8px; border:1px solid #ddd; text-align:left;">' + desc + '</td>'
                            + '<td style="padding:4px 8px; border:1px solid #ddd; text-align:center;">' + videoLink + '</td>'
                            + '<td style="padding:4px 8px; border:1px solid #ddd; text-align:center;">' + videoSource + '</td>'
                            + '<td style="padding:4px 8px; border:1px solid #ddd; text-align:center;">' + axisHtml + '</td>'
                            + '</tr>';
                    });
                });

                totals[zone] = zoneCount;

                html += '<details id="sec-' + zone.toLowerCase() + '" style="margin-bottom:12px;">'
                    + '<summary style="cursor:pointer; font-size:15px; font-weight:bold; padding:8px 12px; background:' + bg + '; border-radius:6px; color:' + color + '; user-select:none;">'
                    + zone + '区 — 共' + zoneCount + '刀</summary>'
                    + '<table style="width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;">'
                    + '<thead><tr>'
                    + '<th style="background:#f0f0f0; padding:6px 8px; border:1px solid #ccc; text-align:center; width:8%;">刀型编号</th>'
                    + '<th style="background:#f0f0f0; padding:6px 8px; border:1px solid #ccc; text-align:center; width:6%;">刀数</th>'
                    + '<th style="background:#f0f0f0; padding:6px 8px; border:1px solid #ccc; text-align:left; width:38%;">阵容描述</th>'
                    + '<th style="background:#f0f0f0; padding:6px 8px; border:1px solid #ccc; text-align:center;">视频链接</th>'
                    + '<th style="background:#f0f0f0; padding:6px 8px; border:1px solid #ccc; text-align:center;">轴来源</th>'
                    + '<th style="background:#f0f0f0; padding:6px 8px; border:1px solid #ccc; text-align:center; width:20%;">轴图</th>'
                    + '</tr></thead>'
                    + '<tbody>' + rows + '</tbody>'
                    + '</table></details>';
            });

            container.innerHTML = html;

            var totalAll = totals.B + totals.C + totals.D;
            document.getElementById("summaryTotal").textContent =
                '全表合计：' + totalAll + '刀（B区' + totals.B + ' + C区' + totals.C + ' + D区' + totals.D + '）';
        }

        // ==================== 排名表渲染 ====================
        function renderRanking(data) {
            var knifeTypes = data.knife_types;
            var users = data.users.slice();

            // 构建 knife 查询字典
            var knifeDict = {};
            knifeTypes.forEach(function(k) { knifeDict[k.id] = k; });

            function renderCell(v) {
                if (!v) return "";
                var k = knifeDict[v];
                return k ? v + " " + k.description.replace(/紫罗兰/g, '<span style="color:red">紫罗兰</span>').replace(/白望/g, '<span style="color:red">白望</span>') : v;
            }

            var tbody = document.getElementById("rankingBody");
            var html = "";

            users.forEach(function(u) {
                var rank = u.rank;
                var name = u.name;
                var level = u.level;
                var knives = u.knives;
                var isBold = u.bold;
                var boldStyle = isBold ? ' style="font-weight:bold"' : "";
                var rowId = "user-" + rank;
                var displayName = isBold ? "<b>" + name + "</b>" : name;

                var allNames = [];
                for (var j = 0; j < 2; j++) {
                    for (var i = 0; i < 3; i++) {
                        allNames.push(renderCell(knives[i] ? knives[i][j] : null));
                    }
                }

                html += '<tr id="' + rowId + '"' + boldStyle + '>'
                    + '<td rowspan="2">' + rank + '</td>'
                    + '<td rowspan="2">' + displayName + '</td>'
                    + '<td rowspan="2">' + level + '</td>'
                    + '<td>' + allNames[0] + '</td>'
                    + '<td>' + allNames[1] + '</td>'
                    + '<td>' + allNames[2] + '</td>'
                    + '</tr>';
                html += '<tr' + boldStyle + '>'
                    + '<td>' + allNames[3] + '</td>'
                    + '<td>' + allNames[4] + '</td>'
                    + '<td>' + allNames[5] + '</td>'
                    + '</tr>';
            });

            tbody.innerHTML = html;
        }

        // ==================== 用户跳转选择框 ====================
        function renderUserSelect(data) {
            var users = data.users.slice();
            var select = document.getElementById("userSelect");
            users.forEach(function(u) {
                var opt = document.createElement("option");
                opt.value = "user-" + u.rank;
                opt.textContent = u.name;
                select.appendChild(opt);
            });
        }

        // ==================== 浮动导航 ====================
        function renderFloatNav(data) {
            var knifeTypes = data.knife_types;
            var users = data.users;
            var knifeCount = {};
            users.forEach(function(u) {
                u.knives.forEach(function(k) {
                    if (Array.isArray(k)) {
                        k.forEach(function(kid) {
                            if (kid) knifeCount[kid] = (knifeCount[kid] || 0) + 1;
                        });
                    } else if (k) {
                        knifeCount[k] = (knifeCount[k] || 0) + 1;
                    }
                });
            });

            var totals = {B: 0, C: 0, D: 0};
            knifeTypes.forEach(function(k) {
                var c = knifeCount[k.id] || 0;
                if (c > 0) totals[k.zone] += c;
            });

            var panel = document.getElementById("navPanel");
            panel.innerHTML =
                '<a href="#sec-b"><span class="nav-dot" style="background:#1565C0;"></span>B区 — ' + totals.B + '刀</a>'
                + '<a href="#sec-c"><span class="nav-dot" style="background:#2E7D32;"></span>C区 — ' + totals.C + '刀</a>'
                + '<a href="#sec-d"><span class="nav-dot" style="background:#b71c1c;"></span>D区 — ' + totals.D + '刀</a>'
                + '<a href="#ranking"><span class="nav-dot" style="background:#e65100;"></span>排刀表</a>';
        }

        // ==================== 交互功能 ====================
        function jumpToUser(userId) {
            if (!userId) return;
            document.querySelectorAll(".highlight-row").forEach(function(el) {
                el.classList.remove("highlight-row");
            });
            var row = document.getElementById(userId);
            if (row) {
                row.classList.add("highlight-row");
                var next = row.nextElementSibling;
                if (next && next.tagName === "TR") {
                    next.classList.add("highlight-row");
                }
                row.scrollIntoView({ behavior: "smooth", block: "center" });
                setTimeout(function() {
                    row.classList.remove("highlight-row");
                    if (next && next.tagName === "TR") {
                        next.classList.remove("highlight-row");
                    }
                }, 2500);
            }
        }

        function openAxisModal(el) {
            document.getElementById("axisModalImg").src = el.getAttribute("data-img");
            document.getElementById("axisModal").classList.add("active");
        }

        function closeAxisModal() {
            document.getElementById("axisModal").classList.remove("active");
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") closeAxisModal();
        });

        // ==================== 浮动导航交互 ====================
        (function() {
            var toggle = document.getElementById("navToggle");
            var panel = document.getElementById("navPanel");
            var backdrop = document.getElementById("navBackdrop");
            function open() { panel.classList.add("open"); backdrop.classList.add("open"); }
            function close() { panel.classList.remove("open"); backdrop.classList.remove("open"); }
            toggle.addEventListener("click", function(e) { e.stopPropagation(); panel.classList.contains("open") ? close() : open(); });
            backdrop.addEventListener("click", close);
            panel.addEventListener("click", function(e) { if (e.target.tagName === "A") close(); });
        })();

        // ==================== 提示弹框交互 ====================
        (function() {
            var overlay = document.getElementById("tipsOverlay");
            var tipsTextEl = document.getElementById("tipsText");
            tipsTextEl.textContent = KNIFE_DATA.tips || "";
            document.getElementById("tipsBtn").addEventListener("click", function() { overlay.classList.add("active"); });
            document.getElementById("tipsClose").addEventListener("click", function() { overlay.classList.remove("active"); });
            overlay.addEventListener("click", function() { overlay.classList.remove("active"); });
        })();
    </script>
</body>
</html>
